<style>
        @keyframes drift {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
            50% { transform: translateY(-20px) rotate(5deg); opacity: 0.4; }
            100% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
        }
        @keyframes stars {
            0% { background-position: 0 0; }
            100% { background-position: 1000px 1000px; }
        }
        @keyframes shimmerscale {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(235, 193, 102, 0.3)); }
            50% { transform: scale(1.02); filter: drop-shadow(0 0 25px rgba(235, 193, 102, 0.6)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(235, 193, 102, 0.3)); }
        }
        .starfield {
            background-image: radial-gradient(circle at 1px 1px, #ffffff22 1px, transparent 0);
            background-size: 40px 40px;
            animation: stars 200s linear infinite;
        }
        .nebula {
            background: radial-gradient(circle at 50% 50%, rgba(42, 27, 61, 0.8) 0%, transparent 70%);
        }
        .floating-card {
            animation: drift 12s ease-in-out infinite;
        }
        .parallax-deep { animation-duration: 20s; }
        .parallax-mid { animation-duration: 15s; }
        .parallax-front { animation-duration: 10s; }
        
        .ornate-emblem {
            background-image: url("data:image/svg+xml,%3Csvg width='600' height='600' viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M300 50 A250 250 0 1 1 299.9 50 Z' fill='none' stroke='%23ebc166' stroke-width='0.5' stroke-opacity='0.3'/%3E%3Cpath d='M300 80 A220 220 0 1 1 299.9 80 Z' fill='none' stroke='%23ebc166' stroke-width='1' stroke-opacity='0.2'/%3E%3Ccircle cx='300' cy='300' r='100' stroke='%23ebc166' stroke-width='0.5' fill='none' stroke-opacity='0.4'/%3E%3Cpath d='M300 200 Q350 300 300 400 Q250 300 300 200' stroke='%23ebc166' stroke-width='1' fill='none' stroke-opacity='0.5'/%3E%3C/svg%3E");

<script>
        // Micro-interactions for audio toggle
        const audioBtn = document.getElementById('audio-toggle');
        let isPlaying = false;
        
        audioBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            const icon = audioBtn.querySelector('.material-symbols-outlined');
            if(isPlaying) {
                icon.textContent = 'volume_up';
                audioBtn.classList.remove('animate-pulse-slow');
                audioBtn.classList.add('animate-spin-slow');
                // Potential audio initiation logic here
            } else {
                icon.textContent = 'brightness_3';
                audioBtn.classList.add('animate-pulse-slow');
            }
        });

        // Parallax scroll effect
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const cards = document.querySelectorAll('.floating-card');
            cards.forEach((card, i) => {
                const speed = 0.1 + (i * 0.05);
                card.style.transform = `translateY(${scrolled * speed}px)`;
            });
        });
    </script>
