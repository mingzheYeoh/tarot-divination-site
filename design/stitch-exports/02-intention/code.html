<style>
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(232, 223, 255, 0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 45px rgba(232, 223, 255, 0.7)); transform: scale(1.02); }
        }
        @keyframes drift-smoke {
            0% { transform: translate(0, 0) opacity(0.3); }
            50% { transform: translate(20px, -10px) opacity(0.5); }
            100% { transform: translate(0, -20px) opacity(0.1); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .animate-pulse-glow { animation: pulse-glow 4s ease-in-out infinite; }
        .smoke-layer { pointer-events: none; mix-blend-mode: screen; opacity: 0.4; }
        .gold-shimmer {
            background: linear-gradient(90deg, rgba(235,193,102,0) 0%, rgba(235,193,102,0.4) 50%, rgba(235,193,102,0) 100%);
            background-size: 200% 100%;
        }
        .gold-shimmer:hover { animation: shimmer 1.5s infinite; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
    </style>

<script>
        // Micro-interactions for the Orb
        const orb = document.querySelector('.animate-pulse-glow');
        if(orb) {
            orb.addEventListener('mousemove', (e) => {
                const rect = orb.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                orb.style.setProperty('--x', `${x}px`);
                orb.style.setProperty('--y', `${y}px`);
            });
        }

        // Vanilla interaction for start ritual button
        const startBtn = document.querySelector('button.group');
        startBtn.addEventListener('click', () => {
            // Simulated transition effect
            document.body.style.transition = 'opacity 1.5s ease-out';
            document.body.style.opacity = '0.3';
            setTimeout(() => {
                // Return to normal or navigate (simulated)
                document.body.style.opacity = '1';
            }, 1000);
        });

        // Atmosphere logic
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.border-b').classList.add('border-primary');
            });
            input.addEventListener('blur', () => {
                if(!input.value) input.parentElement.querySelector('.border-b').classList.remove('border-primary');
            });
        });
    </script>
