        @keyframes shimmer-sweep {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(200%) rotate(45deg); }
        }
        .shimmer-effect {
            position: relative;
            overflow: hidden;
        }
        .shimmer-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(235, 193, 102, 0.4), transparent);
            transform: skewX(-25deg);
            animation: shimmer-sweep 3s infinite;

        .card-flip-container {
            perspective: 1000px;

            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card-inner.is-flipped {
            transform: rotateY(180deg) scale(1.05);
        }
        .card-face {
            backface-visibility: hidden;

        .card-back {

<script>
        function createParticles(x, y) {
            const container = document.getElementById('particle-container');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 2;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 200 + 50;
                const destinationX = Math.cos(angle) * distance;
                const destinationY = Math.sin(angle) * distance;
                
                p.style.left = `50%`;
                p.style.top = `50%`;
                
                container.appendChild(p);
                
                const anim = p.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${destinationX}px, ${destinationY}px) scale(0)`, opacity: 0 }
                ], {
                    duration: Math.random() * 1500 + 1000,
                    easing: 'cubic-bezier(0, .9, .57, 1)',
                    delay: Math.random() * 200
                });
                
                anim.onfinish = () => p.remove();
            }
        }

        let flipped = false;
        function triggerFlip() {
            if (flipped) return;
            flipped = true;
            
            const card = document.getElementById('main-card');
            const action = document.getElementById('action-container');
            const status = document.getElementById('ritual-status');
            const halo = document.getElementById('halo-rays');
            
            card.classList.add('is-flipped');
            
            // Interaction: Burst light particles
            setTimeout(() => {
                createParticles();
            }, 300);

            // Interaction: Fade in UI elements
            setTimeout(() => {
                status.classList.remove('opacity-0', 'translate-y-4');
                action.classList.remove('opacity-0', 'translate-y-4');
                halo.classList.remove('opacity-0', 'scale-50');
            }, 600);
        }

        // Auto-show header
        window.addEventListener('load', () => {
            document.querySelector('nav').classList.add('fade-in');
        });
    </script>
