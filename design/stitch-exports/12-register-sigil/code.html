<style>
        body {
            background-color: #0B0714;
            color: #e8dff3;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #16111f 0%, #0B0714 100%);
        }

        .sigil-canvas {
            filter: drop-shadow(0 0 15px rgba(235, 193, 102, 0.4));
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(200%) rotate(45deg); }
        }

        .shimmer-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(235, 193, 102, 0.2), transparent);
            animation: shimmer 3s infinite;
        }

        .ornamental-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a24b, transparent);
            width: 200px;
        }

        .symbol-chip {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .symbol-chip:hover {
            box-shadow: 0 0 15px rgba(235, 193, 102, 0.3);
            border-color: #ebc166;
        }

        .active-symbol {
            background-color: rgba(235, 193, 102, 0.1);
            border-color: #ebc166 !important;
            color: #ebc166 !important;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #4e4637;
            transition: background-color 0.5s ease;
        }

        .progress-dot.active {
            background-color: #ebc166;
            box-shadow: 0 0 8px #ebc166;
        }

        .sigil-animation-container {
            position: relative;
            width: 320px;
            height: 320px;
        }

        /* Ambient noise overlay */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            z-index: 50;
        }
    </style>

<body class="font-body-md text-body-md">
<div class="noise-overlay"></div>
<div class="starfield"></div>
<!-- Top Navigation (Shell) -->
<nav class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md border-b border-outline-variant/30 shadow-[0_4px_20px_rgba(42,27,61,0.5)]">
<div class="flex justify-between items-center px-margin-mobile md:px-gutter max-w-container-max mx-auto h-20">
<div class="font-display-md text-display-md text-primary tracking-widest cursor-pointer transition-transform active:scale-95">Midnight Oracle</div>
<div class="hidden md:flex gap-stack-lg items-center">
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">首页</a>
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">抽牌占卜</a>
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">牌意图鉴</a>
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">关于</a>
</div>
<div class="flex gap-stack-md">
<span class="material-symbols-outlined text-primary cursor-pointer transition-transform active:scale-95">settings</span>
<span class="material-symbols-outlined text-primary cursor-pointer transition-transform active:scale-95">account_circle</span>
</div>
</div>
</nav>
<!-- Main Ritual Canvas -->
<main class="min-h-screen pt-32 pb-section-padding px-margin-mobile md:px-gutter flex flex-col items-center justify-center max-w-container-max mx-auto relative">
<!-- Progress Indicator -->
<div class="flex items-center gap-stack-md mb-stack-lg">
<div class="progress-dot active"></div>
<div class="h-[1px] w-8 bg-primary/30"></div>
<div class="progress-dot active"></div>
<div class="h-[1px] w-8 bg-outline-variant/30"></div>
<div class="progress-dot"></div>
</div>
<p class="font-label-caps text-label-caps text-primary/60 mb-stack-sm">RITUAL STEP 2 OF 3</p>
<!-- Heading with Ornamental Divider -->
<div class="text-center mb-stack-lg">
<h1 class="font-display-lg text-display-lg-mobile md:text-display-lg text-primary mb-stack-md">铸造属于你的印记</h1>
<div class="flex items-center justify-center gap-stack-md opacity-60">
<div class="ornamental-line"></div>
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<div class="ornamental-line"></div>
</div>
</div>
<!-- Central Sigil Forge -->
<div class="sigil-animation-container flex items-center justify-center mb-stack-lg">
<!-- Background WebGL/Shader Placeholder for cosmic energy -->
<div class="absolute inset-0 rounded-full border border-primary/20 bg-glow-violet/20 blur-3xl scale-125"></div>
<div class="relative w-full h-full flex items-center justify-center rounded-full border border-primary/40 p-12 bg-surface-container-lowest/30 backdrop-blur-sm shadow-[0_0_50px_rgba(235,193,102,0.1)]">
<!-- SVG Sigil (Dynamic) -->
<svg class="w-full h-full sigil-canvas overflow-visible" id="sigil-svg" viewbox="0 0 200 200">
<defs>
<filter id="glow">
<fegaussianblur result="coloredBlur" stddeviation="2.5"></fegaussianblur>
<femerge>
<femergenode in="coloredBlur"></femergenode>
<femergenode in="SourceGraphic"></femergenode>
</femerge>
</filter>
</defs>
<!-- Outer Rings -->
<circle cx="100" cy="100" fill="none" opacity="0.3" r="95" stroke="#c9a24b" stroke-dasharray="2,2" stroke-width="0.5"></circle>
<circle cx="100" cy="100" fill="none" opacity="0.6" r="85" stroke="#ebc166" stroke-width="1"></circle>
<!-- Dynamic Symbols Layer -->
<g class="transition-all duration-700" id="sigil-elements">
<!-- Default moon phase in center -->
<path d="M100,60 C122,60 140,78 140,100 C140,122 122,140 100,140 C125,140 145,120 145,100 C145,80 125,60 100,60 Z" fill="none" filter="url(#glow)" id="core-symbol" stroke="#ebc166" stroke-width="1.5"></path>
<!-- Decorative thin lines -->
<line stroke="#c9a24b" stroke-width="0.5" x1="100" x2="100" y1="20" y2="40"></line>
<line stroke="#c9a24b" stroke-width="0.5" x1="100" x2="100" y1="160" y2="180"></line>
<line stroke="#c9a24b" stroke-width="0.5" x1="20" x2="40" y1="100" y2="100"></line>
<line stroke="#c9a24b" stroke-width="0.5" x1="160" x2="180" y1="100" y2="100"></line>
</g>
</svg>
</div>
</div>
<!-- Symbol Selection Chips -->
<div class="w-full max-w-lg mb-12">
<p class="text-center font-tagline-italic text-tagline-italic text-on-surface-variant/80 italic mb-stack-md">选择与你灵魂共鸣的图腾</p>
<div class="flex flex-wrap justify-center gap-stack-md">
<button class="symbol-chip active-symbol group flex flex-col items-center gap-2 p-4 rounded-xl border border-outline-variant/40 bg-surface-container-low/50 hover:bg-surface-container/50" onclick="selectSymbol('moon_phase', this)">
<span class="material-symbols-outlined text-3xl">brightness_3</span>
<span class="font-label-caps text-[10px] tracking-widest uppercase">Moon</span>
</button>
<button class="symbol-chip group flex flex-col items-center gap-2 p-4 rounded-xl border border-outline-variant/40 bg-surface-container-low/50 hover:bg-surface-container/50" onclick="selectSymbol('star', this)">
<span class="material-symbols-outlined text-3xl">star</span>
<span class="font-label-caps text-[10px] tracking-widest uppercase">Star</span>
</button>
<button class="symbol-chip group flex flex-col items-center gap-2 p-4 rounded-xl border border-outline-variant/40 bg-surface-container-low/50 hover:bg-surface-container/50" onclick="selectSymbol('wand', this)">
<span class="material-symbols-outlined text-3xl">magic_button</span>
<span class="font-label-caps text-[10px] tracking-widest uppercase">Wand</span>
</button>
<button class="symbol-chip group flex flex-col items-center gap-2 p-4 rounded-xl border border-outline-variant/40 bg-surface-container-low/50 hover:bg-surface-container/50" onclick="selectSymbol('all_seeing', this)">

</button>
</div>

<button class="relative group mt-8 py-4 px-12 rounded-full overflow-hidden transition-all active:scale-95">

<!-- Side Floating Audio Control (Shell Component) -->
<div class="fixed bottom-8 right-8 z-50">
<div class="flex items-center justify-center w-14 h-14 rounded-full p-4 bg-surface-container-lowest/50 backdrop-blur-xl border border-primary/40 shadow-[0_0_15px_rgba(235,193,102,0.3)] cursor-pointer animate-pulse-slow active:rotate-12 transition-all hover:scale-110 hover:shadow-[0_0_20px_rgba(235,193,102,0.5)]">

<footer class="w-full py-section-padding bg-background-void border-t border-outline-variant/20 fade-in duration-500">

<div class="font-display-lg text-display-lg text-primary opacity-80">Midnight Oracle</div>
<div class="flex gap-stack-lg">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors" href="#">隐私政策</a>
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors" href="#">服务条款</a>

</div>

</div>
</footer>
<script>
        // Micro-interaction for symbol selection
        function selectSymbol(type, element) {
            // Remove active state from all
            document.querySelectorAll('.symbol-chip').forEach(chip => {
                chip.classList.remove('active-symbol');
            });
            // Add active state to clicked
            element.classList.add('active-symbol');

            const path = document.getElementById('core-symbol');
            
            // Animation triggers for the SVG path
            // Simplistic path swapping for the demo
            switch(type) {
                case 'star':
                    path.setAttribute('d', 'M100,60 L112,90 L145,95 L120,115 L128,145 L100,130 L72,145 L80,115 L55,95 L88,90 Z');
                    break;
                case 'wand':
                    path.setAttribute('d', 'M80,80 L120,120 M120,80 L80,120 M100,70 L100,130 M70,100 L130,100');
                    break;
                case 'all_seeing':
                    path.setAttribute('d', 'M60,100 C60,100 80,70 100,70 C120,70 140,100 140,100 C140,100 120,130 100,130 C80,130 60,100 60,100 Z M100,110 A10,10 0 1,0 100,90 A10,10 0 1,0 100,110');
                    break;
                case 'diamond':
                    path.setAttribute('d', 'M100,60 L140,100 L100,140 L60,100 Z');
                    break;
                default: // Moon
                    path.setAttribute('d', 'M100,60 C122,60 140,78 140,100 C140,122 122,140 100,140 C125,140 145,120 145,100 C145,80 125,60 100,60 Z');
            }
        }

        // Starfield particle background effect
        const createStars = () => {
            const container = document.querySelector('.starfield');
            for(let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                const size = Math.random() * 2;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.position = 'absolute';
                star.style.top = `${Math.random() * 100}%`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.backgroundColor = '#E8DFFF';
                star.style.borderRadius = '50%';
                star.style.opacity = Math.random();
                star.style.boxShadow = `0 0 ${Math.random() * 5}px #ebc166`;
                
                // Add twinkle animation
                star.animate([
                    { opacity: star.style.opacity },
                    { opacity: Math.random() * 0.2 },
                    { opacity: star.style.opacity }
                ], {
                    duration: 3000 + Math.random() * 5000,
                    iterations: Infinity
                });
                
                container.appendChild(star);
            }
        };

        window.onload = createStars;
    </script>
</body></html>
