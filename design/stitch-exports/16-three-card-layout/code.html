<style>
        body {
            background-color: #0B0714;
            overflow-x: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle at center, #120C1F 0%, #0B0714 100%);
        }

        .velvet-surface {
            background: radial-gradient(ellipse at bottom, #2A1B3D 0%, #16111f 70%, #0B0714 100%);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        .card-flip-reveal {
            perspective: 1000px;
            animation: card-entry 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes card-entry {
            from { opacity: 0; transform: translateY(20px) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        .halo-glow {
            filter: blur(40px);
            background: radial-gradient(circle, rgba(232, 223, 255, 0.2) 0%, transparent 70%);
        }

        .shimmer-border {
            position: relative;
            overflow: hidden;
        }

        .shimmer-border::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 45%,
                rgba(235, 193, 102, 0.4) 50%,
                transparent 55%
            );
            animation: shimmer 4s infinite linear;
        }

        @keyframes shimmer {
            0% { transform: translate(-30%, -30%); }
            100% { transform: translate(30%, 30%); }
        }

        .light-burst {
            background: radial-gradient(circle, #E8DFFF 0%, transparent 60%);
            mix-blend-mode: screen;
            animation: burst 1.5s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.5); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }

        .floating-candle {
            animation: candle-flicker 4s infinite ease-in-out;
        }

        @keyframes candle-flicker {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
            50% { transform: translateY(-5px) scale(1.02); opacity: 1; }
        }
    </style>

<script>
        // Subtle Mouse parallax for the cards
        document.addEventListener('mousemove', (e) => {
            const table = document.querySelector('.velvet-surface');
            if (!table) return;
            
            const rect = table.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            
            const cards = document.querySelectorAll('.group');
            cards.forEach((card, index) => {
                const depth = (index + 1) * 5;
                card.style.transform = `translate(${x * depth}px, ${y * depth}px) rotateY(${x * 5}deg) rotateX(${-y * 5}deg)`;
            });
        });

        // Trigger reveal of the third card after a delay
        setTimeout(() => {
            const burst = document.querySelector('.light-burst');
            if (burst) {
                burst.style.opacity = '1';
            }
        }, 800);
    </script>
