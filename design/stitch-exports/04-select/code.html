<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        /* Ritualistic Pacing & Transitions */
        .card-reveal-transition {
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.6s ease;
        }

        /* Metallic Shimmer Effect */
        .shimmer-sweep {
            position: relative;
            overflow: hidden;
        }
        .shimmer-sweep::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -150%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 0%,
                rgba(235, 193, 102, 0) 45%,
                rgba(235, 193, 102, 0.2) 50%,
                rgba(235, 193, 102, 0) 55%,
                transparent 100%
            );
            transition: all 0.8s ease;
            transform: rotate(45deg);
        }
        .card-container:hover .shimmer-sweep::after {
            left: 100%;
        }

        /* Nebula Glow */
        .nebula-bg {
            background: radial-gradient(circle at 50% 50%, #2A1B3D 0%, #16111f 70%, #0B0714 100%);
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        /* Custom Fan Logic */
        .card-fan-item {
            position: absolute;
            transform-origin: bottom center;
            bottom: 0;
            left: 50%;
            margin-left: -60px; /* Half of card width approx */
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), z-index 0.3s;
        }

        .card-container:hover {
            z-index: 50 !important;
        }
    </style>

<!-- Main Ritual Canvas -->

<!-- The Altar Table (Dark Velvet Texture) -->

<span class="material-symbols-outlined text-primary text-label-caps" id="audio-icon">volume_up</span>

</div>

<script>
        // Generate the 15-card arc
        const cardFan = document.getElementById('card-fan');
        const totalCards = 15;
        const arcRadius = 1100; // Radius of the circular path
        const arcAngle = 50; // Total spread in degrees

        for (let i = 0; i < totalCards; i++) {
            const angle = (i / (totalCards - 1)) * arcAngle - (arcAngle / 2);
            const container = document.createElement('div');
            container.className = 'card-fan-item card-container cursor-pointer';
            
            // Initial positioning based on arc
            container.style.transform = `rotate(${angle}deg) translateY(-${arcRadius}px) translateY(${arcRadius}px)`;
            container.style.zIndex = i + 10;

            const cardMarkup = `
                <div class="relative w-32 h-52 md:w-44 md:h-72 rounded-lg p-0.5 bg-primary/20 border border-primary/40 shadow-lg card-reveal-transition shimmer-sweep group hover:-translate-y-24 hover:scale-110 hover:rotate-0 hover:z-50 hover:shadow-[0_20px_50px_rgba(235,193,102,0.4)]">
                    <!-- Warm Glow Underneath (Visible on Hover) -->
                    <div class="absolute inset-0 rounded-lg bg-primary/0 group-hover:bg-primary/5 transition-colors duration-500"></div>
                    <div class="absolute -bottom-8 left-1/2 -translate-x-1/2 w-3/4 h-8 bg-primary/40 blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
                    
                    <!-- Card Content (Back) -->
                    <div class="w-full h-full rounded-[0.4rem] bg-card-back flex items-center justify-center relative overflow-hidden">
                        <!-- Filigree pattern background -->
                        <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, #ebc166 1px, transparent 0); background-size: 16px 16px;"></div>
                        
                        <!-- Center Seal -->
                        <div class="relative w-16 h-16 md:w-24 md:h-24 border-2 border-primary/40 rounded-full flex items-center justify-center">
                            <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">star_half</span>
                        </div>
                        
                        <!-- Corner Embellishments -->
                        <div class="absolute top-2 left-2 text-primary/40 text-xs font-display-md">M.O.</div>
                        <div class="absolute bottom-2 right-2 text-primary/40 text-xs font-display-md">M.O.</div>
                    </div>
                </div>
            `;
            
            container.innerHTML = cardMarkup;
            cardFan.appendChild(container);

            // Add click listener for ritual effect
            container.addEventListener('click', function() {
                this.classList.add('scale-150', 'opacity-0');
                setTimeout(() => {
                    // Logic for card selection success
                    console.log("Card selected: " + i);
                }, 600);
            });
        }

        // Particle Background Logic
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.speedY = (Math.random() - 0.5) * 0.2;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            draw() {
                ctx.fillStyle = `rgba(235, 193, 102, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        function toggleAudio() {
            const icon = document.getElementById('audio-icon');
            if (icon.textContent === 'volume_up') {
                icon.textContent = 'volume_off';
            } else {
                icon.textContent = 'volume_up';
            }
        }
    </script>
