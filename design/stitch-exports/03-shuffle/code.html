        @keyframes float-fade {
            0% { transform: translateY(10px) scale(0.8); opacity: 0; filter: blur(2px); }

            100% { transform: translateY(-30px) scale(1.1); opacity: 0; filter: blur(4px); }

            position: absolute;

            0% { transform: translateX(0) scaleX(1); opacity: 0; }
            50% { transform: translateX(-60px) scaleX(2); opacity: 0.4; }
            100% { transform: translateX(-120px) scaleX(1); opacity: 0; }
        }

        @keyframes smear-right {
            0% { transform: translateX(0) scaleX(1); opacity: 0; }
            50% { transform: translateX(60px) scaleX(2); opacity: 0.4; }
            100% { transform: translateX(120px) scaleX(1); opacity: 0; }
        }

        .light-smear {
            background: linear-gradient(90deg, transparent, #ebc166, transparent);
            filter: blur(8px);
        }

        /* Circular Progress Ring */
        @keyframes progress-spin {
            0% { stroke-dashoffset: 283; transform: rotate(-90deg); }
            100% { stroke-dashoffset: 0; transform: rotate(270deg); }
        }

        .progress-ring-circle {
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            transform-origin: center;
            animation: progress-spin 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* Texture Overlays */

<script>
        // Floating Rune Logic
        const runeChars = ['ᚠ', 'ᚢ', 'ᚦ', 'ᚨ', 'ᚱ', 'ᚲ', 'ᚷ', 'ᚹ', 'ᚺ', 'ᚻ', 'ᛁ', 'ᛃ', 'ᛇ', 'ᛈ', 'ᛉ', 'ᛊ', 'ᛋ', 'ᛏ', 'ᛒ', 'ᛗ', 'ᛚ'];
        const container = document.getElementById('rune-container');

        function createRune() {
            const rune = document.createElement('div');
            rune.className = 'rune';
            rune.textContent = runeChars[Math.floor(Math.random() * runeChars.length)];
            
            // Random positioning
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            rune.style.left = `${x}%`;
            rune.style.top = `${y}%`;
            
            // Random duration and delay
            const duration = 3 + Math.random() * 4;
            rune.style.animationDuration = `${duration}s`;
            
            container.appendChild(rune);
            
            // Cleanup
            setTimeout(() => {
                rune.remove();
            }, duration * 1000);
        }

        // Spawn runes periodically
        setInterval(createRune, 800);

        // Initial burst
        for(let i=0; i<10; i++) {
            setTimeout(createRune, i * 200);
        }

        // Interaction Micro-moments
        document.addEventListener('mousemove', (e) => {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            
            const moveX = (mouseX - centerX) / 50;
            const moveY = (mouseY - centerY) / 50;
            
            const deck = document.querySelector('.preserve-3d');
            if (deck) {
                deck.style.transform = `translate3d(${moveX}px, ${moveY}px, 0) rotateY(${moveX}deg) rotateX(${-moveY}deg)`;
            }
        });
    </script>
